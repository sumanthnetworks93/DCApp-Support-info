[build]
  command = "npm run build"
  publish = "dist"

# Legacy /legal/*.html URLs (App Store & existing links)
[[redirects]]
  from = "/legal/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/legal/terms.html"
  to = "/terms"
  status = 301

[[redirects]]
  from = "/legal/community.html"
  to = "/community-guidelines"
  status = 301

[[redirects]]
  from = "/legal/dmca.html"
  to = "/dmca"
  status = 301

[[redirects]]
  from = "/legal/do-not-sell.html"
  to = "/do-not-sell"
  status = 301

# Short aliases
[[redirects]]
  from = "/help"
  to = "/support"
  status = 301

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
